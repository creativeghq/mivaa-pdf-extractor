name: Detach Fork

on:
  workflow_dispatch:

jobs:
  detach:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository to temp directory
        run: |
          mkdir -p /tmp/fork-detach
          cd /tmp/fork-detach
          git clone --bare https://github.com/creativeghq/mivaa-pdf-extractor.git
      
      - name: Delete forked repository
        run: |
          curl -X DELETE \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/creativeghq/mivaa-pdf-extractor
      
      - name: Create new repository
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/repos \
            -d '{"name":"mivaa-pdf-extractor","private":false}'
      
      - name: Mirror push
        run: |
          cd /tmp/fork-detach
          git --git-dir mivaa-pdf-extractor.git push --mirror https://${{ secrets.GITHUB_TOKEN }}@github.com/creativeghq/mivaa-pdf-extractor.git
